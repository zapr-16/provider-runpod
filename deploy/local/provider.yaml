apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-runpod
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: provider-runpod
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-runpod
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-runpod
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: provider-runpod
      containers:
        - name: provider
          image: provider-runpod:local
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
