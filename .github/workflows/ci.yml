name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Run golangci-lint
        # v7+ is required for golangci-lint v2.x.
        uses: golangci/golangci-lint-action@v7
        with:
          # v2.3.0 was built with Go 1.24 — fails to load configs that
          # target Go 1.26+ (this project's go.mod is on 1.26.2).
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Run tests
        run: go test -v -race ./...

  build:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build provider binary
        run: go build ./cmd/provider/
