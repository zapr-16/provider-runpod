---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pods.runpod.crossplane.io
spec:
  group: runpod.crossplane.io
  names:
    categories:
    - crossplane
    kind: Pod
    listKind: PodList
    plural: pods
    singular: pod
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A Pod is a managed RunPod GPU workload.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PodSpec defines the desired state of a RunPod Pod resource.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: PodParameters define the desired state inputs for a RunPod
                  pod.
                properties:
                  cloudType:
                    description: RunPod cloud class for scheduling, limited to SECURE
                      or COMMUNITY.
                    type: string
                  containerDiskInGb:
                    description: Size of the ephemeral container disk in GiB.
                    format: int32
                    type: integer
                  dockerStartCmd:
                    description: Command array passed to the container as its startup
                      command.
                    items:
                      type: string
                    type: array
                  env:
                    description: Environment variables injected into the container
                      at startup.
                    items:
                      description: EnvVar defines an environment variable passed to
                        the pod container.
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                  gpuCount:
                    description: Number of GPUs requested for the pod.
                    format: int32
                    type: integer
                  gpuTypeIds:
                    description: Ordered set of acceptable RunPod GPU type IDs for
                      placement.
                    items:
                      type: string
                    type: array
                  imageName:
                    description: Container image to run for the pod workload.
                    type: string
                  recreateOnTerminate:
                    description: |
                      RecreateOnTerminate causes the controller to clear the
                      external name and report the resource as missing whenever
                      RunPod marks the pod EXITED or TERMINATED. The next
                      reconcile then calls Create() and provisions a fresh pod
                      with the same spec. Useful for Spot-backed workloads.
                      Defaults to false.
                    type: boolean
                  ports:
                    description: Container ports to expose, later serialized to RunPod
                      "<port>/<protocol>" strings.
                    items:
                      description: Port defines a container port exposed by the pod.
                      properties:
                        number:
                          format: int32
                          type: integer
                        protocol:
                          type: string
                      required:
                      - number
                      type: object
                    type: array
                  supportPublicIp:
                    description: Request a public IP for COMMUNITY cloud pods so exposed
                      ports receive external mappings.
                    type: boolean
                  volumeInGb:
                    description: Size of the persisted pod volume in GiB.
                    format: int32
                    type: integer
                  volumeMountPath:
                    description: Mount path inside the container for the persisted
                      pod volume.
                    type: string
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              publishConnectionDetailsTo:
                description: |-
                  PublishConnectionDetailsTo specifies the connection secret config which
                  contains a name, metadata and a reference to secret store config to
                  which any connection details for this managed resource should be written.
                  Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  configRef:
                    default:
                      name: default
                    description: |-
                      SecretStoreConfigRef specifies which secret store config should be used
                      for this ConnectionSecret.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  metadata:
                    description: Metadata is the metadata for connection secret.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          Annotations are the annotations to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.annotations".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are the labels/tags to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.labels".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      type:
                        description: |-
                          Type is the SecretType for the connection secret.
                          - Only valid for Kubernetes Secret Stores.
                        type: string
                    type: object
                  name:
                    description: Name is the name of the connection secret.
                    type: string
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                  This field is planned to be replaced in a future release in favor of
                  PublishConnectionDetailsTo. Currently, both could be set independently
                  and connection details would be published to both without affecting
                  each other.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: PodStatus reflects the observed state of a RunPod Pod resource.
            properties:
              atProvider:
                description: PodObservation captures the observed state returned by
                  RunPod.
                properties:
                  costPerHr:
                    description: Effective hourly pod cost from the RunPod observation
                      response.
                    type: number
                  desiredStatus:
                    description: Raw RunPod lifecycle status from GET /pods/{podId}.
                    type: string
                  gpuDisplayName:
                    description: Human-readable GPU name from machine.gpuDisplayName,
                      or from the nested GPU object as fallback.
                    type: string
                  lastStartedAt:
                    description: Timestamp of the last pod start event, parsed from
                      the RunPod response.
                    format: date-time
                    type: string
                  networkingReady:
                    description: Derived readiness flag, true only when PublicIP is
                      non-empty and PortMappings is non-nil.
                    type: boolean
                  podId:
                    description: RunPod pod ID returned by create and mirrored from
                      the external name.
                    type: string
                  portMappings:
                    additionalProperties:
                      format: int32
                      type: integer
                    description: External port numbers keyed by RunPod port token,
                      absent during networking initialization.
                    type: object
                  publicIp:
                    description: Public IP assigned to the pod once networking is
                      ready.
                    type: string
                  runtimeEndpoint:
                    description: Derived endpoint URL built from the first HTTP port
                      mapping when networking is ready.
                    type: string
                required:
                - networkingReady
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
