apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-runpod
  annotations:
    meta.crossplane.io/maintainer: zapr-16 <pazrodrigo@gmail.com>
    meta.crossplane.io/source: github.com/zapr-16/provider-runpod
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Crossplane provider that manages GPU compute on RunPod.io.
      Currently exposes a `Pod` resource and a `ProviderConfig` for
      API-key credentials.
    meta.crossplane.io/readme: |
      See https://github.com/zapr-16/provider-runpod for installation
      and usage.  Authentication is via RunPod API key supplied through
      a Kubernetes Secret referenced from a ProviderConfig.
spec:
  controller:
    image: ghcr.io/zapr-16/provider-runpod:v0.1.0
  crossplane:
    version: ">=v1.14.0-0"
